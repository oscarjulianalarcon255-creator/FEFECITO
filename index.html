<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiración Diaria - Tu Agenda Personalizada</title>
    <!-- Fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(212, 175, 55, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Fondo decorativo sutil */
        .background-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 10%;
            z-index: 0;
            pointer-events: none;
        }

        .background-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 10%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
            z-index: 10;
            text-align: center;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Selector de Categorías */
        .categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .category-btn {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .category-btn.active {
            background: var(--gold);
            color: #0f172a;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* Tarjeta de la Frase */
        .quote-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .quote-card:hover {
            transform: translateY(-5px);
        }

        .quote-icon {
            font-size: 3rem;
            color: var(--gold);
            opacity: 0.2;
            position: absolute;
            top: 20px;
            left: 30px;
            font-family: 'Cinzel', serif;
        }

        .quote-text {
            font-size: 1.35rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .quote-author {
            font-size: 0.95rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
            transition: opacity 0.4s ease;
        }

        .quote-category-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* Animaciones para la transición */
        .fade-out {
            opacity: 0;
            transform: translateY(15px);
        }

        /* Botón Principal */
        .action-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }

        .action-btn:hover {
            background: var(--gold);
            color: #0f172a;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.05);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>
    <div class="background-glow-2"></div>

    <div class="container">
        <header>
            <h1>Inspiración Diaria</h1>
            <p>Pensamientos para liderar y crecer</p>
        </header>

        <!-- Selector de Categorías -->
        <div class="categories">
            <button class="category-btn active" onclick="setCategory('all')">Todas</button>
            <button class="category-btn" onclick="setCategory('liderazgo')">Liderazgo</button>
            <button class="category-btn" onclick="setCategory('exito')">Éxito y Visión</button>
            <button class="category-btn" onclick="setCategory('enfoque')">Productividad</button>
        </div>

        <!-- Tarjeta de Frase -->
        <div class="quote-card">
            <div class="quote-icon">“</div>
            <p class="quote-text" id="quoteText">Cargando inspiración...</p>
            <p class="quote-author" id="quoteAuthor">- Autor</p>
            <span class="quote-category-tag" id="quoteCategory">Categoría</span>
        </div>

        <!-- Botón de acción -->
        <button class="action-btn" onclick="getNewQuote()">Nueva Frase</button>

        <footer>
            Hecho con aprecio • Agenda 2026
        </footer>
    </div>

    <script>

            { text: "El éxito no se logra solo con cualidades especiales. Es sobre todo un trabajo de constancia, de método y de organización.", author: "Víctor Hugo", cat: "exito" },

            { text: "La excelencia no es un acto, sino un hábito.", author: "Aristóteles", cat: "exito" },

            { text: "El tiempo que disfrutas perdiendo no es tiempo perdido.", author: "Marthe Troly-Curtin", cat: "enfoque" },
            { text: "La productividad nunca es un accidente. Siempre es el resultado de un compromiso con la excelencia, la planificación inteligente y el esfuerzo enfocado.", author: "Paul J. Meyer", cat: "enfoque" },
            { text: "Lo que se mide, se gestiona.", author: "Peter Drucker", cat: "enfoque" },
            { text: "No es que tengamos poco tiempo, sino que perdemos mucho.", author: "Séneca", cat: "enfoque" },
            { text: "Enfócate en ser productivo, no en estar ocupado.", author: "Tim Ferriss", cat: "enfoque" },
            { text: "Hacer dos cosas a la vez es no hacer ninguna de las dos.", author: "Publilio Siro", cat: "enfoque" },
            { text: "La clave no es priorizar lo que está en tu agenda, sino agendar tus prioridades.", author: "Stephen Covey", cat: "enfoque" },
            { text: "La disciplina es el puente entre las metas y los logros.", author: "Jim Rohn", cat: "enfoque" },
            { text: "Comienza donde estás. Usa lo que tienes. Haz lo que puedes.", author: "Arthur Ashe", cat: "enfoque" },
            { text: "Haz de cada día tu obra maestra.", author: "John Wooden", cat: "enfoque" },
            { text: "No cuentes los días, haz que los días cuenten.", author: "Muhammad Ali", cat: "enfoque" },
            { text: "La concentración es el secreto de la fuerza.", author: "Ralph Waldo Emerson", cat: "enfoque" },
            { text: "Tu futuro depende de lo que hagas hoy, no mañana.", author: "Mahatma Gandhi", cat: "enfoque" },
            { text: "Es más fácil excluir los ruidos molestos cuando estás enfocado en una melodía hermosa.", author: "Anónimo", cat: "enfoque" },

        let currentCategory = 'all';

        // Muestra una frase aleatoria basada en la categoría seleccionada
        function getNewQuote() {
            const textEl = document.getElementById('quoteText');
            const authorEl = document.getElementById('quoteAuthor');
            const categoryEl = document.getElementById('quoteCategory');

            // Efecto de desvanecimiento (fade-out)
            textEl.classList.add('fade-out');
            authorEl.classList.add('fade-out');

            setTimeout(() => {
                // Filtrar frases
                const filteredQuotes = currentCategory === 'all' 
                    ? quotes 
                    : quotes.filter(q => q.cat === currentCategory);

                // Elegir una aleatoria
                const randomIndex = Math.floor(Math.random() * filteredQuotes.length);
                const selected = filteredQuotes[randomIndex];

                // Actualizar textos
                textEl.innerText = `"${selected.text}"`;
                authorEl.innerText = `- ${selected.author}`;
                
                // Formatear tag de categoría
                let catName = "General";
                if (selected.cat === 'liderazgo') catName = "Liderazgo";
                if (selected.cat === 'exito') catName = "Éxito y Visión";
                if (selected.cat === 'enfoque') catName = "Productividad";
                categoryEl.innerText = catName;

                // Quitar efecto de desvanecimiento (fade-in)
                textEl.classList.remove('fade-out');
                authorEl.classList.remove('fade-out');
            }, 400);
        }

        // Cambiar la categoría activa
        function setCategory(cat) {
            currentCategory = cat;
            
            // Actualizar clases de los botones
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Buscar cuál botón activar
            event.target.classList.add('active');
            
            // Traer nueva frase de esa categoría inmediatamente
            getNewQuote();
        }

        // Cargar frase inicial cuando cargue la página
        window.onload = getNewQuote;
    </script>
</body>
</html>
